name: .NET

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  AZURE_RG: RG3
  AZURE_SUBSCRIPTION: 800982df-0d42-4dd6-bf93-ae1cb4eb99a5
  AZURE_LOCATION: WestEurope

jobs:
  Build-Job:
    runs-on: ubuntu-latest

    env:
      configuration: Release

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.configuration }}

      - name: Test
        run: dotnet test --no-build --verbosity normal --configuration ${{ env.configuration }}

      - name: Publish
        run: dotnet publish --no-build --configuration ${{ env.configuration }} --output ${{ runner.temp }}/publish
